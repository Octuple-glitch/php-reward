<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Reward</title>

}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;

.box {

    padding: 20px;

    box-shadow: 0 5px 20px rgba(0,0,0,0.1);

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

.progress {
    height: 10px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin: 15px 0;
}

.progress-bar {
    height: 100%;
    width: 87%;
    background: #4caf50;
}

.steps {
    text-align: left;
    font-size: 14px;
    margin: 15px 0;

.steps p {
    margin: 6px 0;

.button {
    display: block;
    background: #28a745;
    color: white;
    padding: 15px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    margin-top: 15px;
    font-size: 16px;

.small {
    font-size: 12px;
    color: gray;
    margin-top: 10px;

    </div>
</div>

</body>
</html>
